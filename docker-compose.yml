services:
  blog:
    image: ghcr.io/hmj1026/lin_blog:${BLOG_IMAGE_TAG:?BLOG_IMAGE_TAG must be set to an immutable release or SHA tag}
    build:
      context: ./web
      args:
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
    container_name: blog_app
    restart: unless-stopped
    ports:
      # 僅綁定 loopback：應用只透過主機 nginx 反向代理對外（nginx 代理至
      # 127.0.0.1:3100 並設定可信的 X-Real-IP）。Docker 會繞過 UFW，若綁到
      # 所有介面，攻擊者可直連 3100 自行偽造 X-Real-IP 繞過訂閱限流，故必須
      # 明確綁 127.0.0.1。
      - "127.0.0.1:${BLOG_PORT:-3100}:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NODE_ENV=production
      - APP_ENV=production
      - NEXT_PUBLIC_APP_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_UPLOAD_BASE_URL=${NEXT_PUBLIC_UPLOAD_BASE_URL:-}
      # Storage
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-}
      - STORAGE_REGION=${STORAGE_REGION:-}
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT:-}
      - STORAGE_ACCESS_KEY_ID=${STORAGE_ACCESS_KEY_ID:-}
      - STORAGE_SECRET_ACCESS_KEY=${STORAGE_SECRET_ACCESS_KEY:-}
      - UPLOAD_MAX_FILE_SIZE_MB=${UPLOAD_MAX_FILE_SIZE_MB:-10}
      # External Services
      - CRON_SECRET=${CRON_SECRET:-}
      # Analytics (Optional)
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
      - NEXT_PUBLIC_GTM_ID=${NEXT_PUBLIC_GTM_ID:-}
      - NEXT_PUBLIC_FB_PIXEL_ID=${NEXT_PUBLIC_FB_PIXEL_ID:-}
      # Newsletter / reCAPTCHA v2
      - NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
      - RECAPTCHA_ALLOWED_HOSTNAMES=${RECAPTCHA_ALLOWED_HOSTNAMES:-}
      - NEWSLETTER_RATE_LIMIT_WINDOW_SECONDS=${NEWSLETTER_RATE_LIMIT_WINDOW_SECONDS:-600}
      - NEWSLETTER_RATE_LIMIT_MAX=${NEWSLETTER_RATE_LIMIT_MAX:-5}
      - NEWSLETTER_SOURCE_HASH_SECRET=${NEWSLETTER_SOURCE_HASH_SECRET:-}
      - APP_REPLICA_COUNT=${APP_REPLICA_COUNT:-1}
    volumes:
      - blog_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/').then((response) =>
          process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - blog_network

  postgres:
    image: postgres:16-alpine
    container_name: blog_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # 僅綁定 loopback：資料庫不對外曝露（Docker 會繞過 UFW，故必須在此明確綁 127.0.0.1）
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - blog_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  blog_storage:

networks:
  blog_network:
    driver: bridge
