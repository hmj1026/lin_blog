name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']   # 版本 tag（如 v1.2.0）→ 產生對應版本的 image
    paths:
      # 僅在 web/ 或相關 workflow 變更時才於 main push 建置；tag push 不受 paths 影響
      # （GitHub 明文：Path filters are not evaluated for pushes of tags），release 一定會建置。
      - "web/**"
      - ".github/workflows/docker-build.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    # PR Docker gate（upgrade-nextjs-16 §6.6）：只 build + health smoke，不 push
    paths:
      - "web/**"
      - "docker-compose.yml"
      - "docker-compose.verify.yml"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 先執行 CI 檢查
  ci:
    uses: ./.github/workflows/ci.yml

  # PR gate：建置 image 並以隔離 compose 啟動 DB + app，套用 migration、
  # 輪詢 health 與基本 smoke（upgrade-nextjs-16 §6.6）。不 push、不用 secrets。
  pr-docker-verify:
    name: PR Docker Build & Health
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: false
          load: true
          tags: lin-blog-pr-verify:${{ github.sha }}
          cache-from: type=gha
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=pr-verify-not-secret

      - name: Start isolated stack, migrate, health, smoke
        run: |
          cat > /tmp/verify-env.txt <<'EOF'
          VERIFY_CONTAINER_PREFIX=lin-blog-pr-verify
          VERIFY_BLOG_PORT=3200
          DATABASE_URL=postgresql://verify:verifypass@postgres:5432/lin_blog_verify
          NEXTAUTH_SECRET=pr-verify-not-a-real-secret-0123456789
          NEXTAUTH_URL=http://127.0.0.1:3200
          NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3200
          POSTGRES_USER=verify
          POSTGRES_PASSWORD=verifypass
          POSTGRES_DB=lin_blog_verify
          POSTGRES_PORT=0
          CRON_SECRET=pr-verify-cron-not-secret
          EOF
          echo "BLOG_IMAGE_TAG=${{ github.sha }}" >> /tmp/verify-env.txt
          # 覆寫 image 為本次建置的本地 tag
          cat > /tmp/image-override.yml <<'EOF'
          services:
            blog:
              image: lin-blog-pr-verify:${BLOG_IMAGE_TAG}
          EOF
          COMPOSE="docker compose -p lin-blog-pr-verify -f docker-compose.yml -f docker-compose.verify.yml -f /tmp/image-override.yml --env-file /tmp/verify-env.txt"
          $COMPOSE up -d
          docker exec lin-blog-pr-verify_app node node_modules/prisma/build/index.js migrate deploy
          for i in $(seq 1 40); do
            st=$(docker inspect --format '{{.State.Health.Status}}' lin-blog-pr-verify_app)
            [ "$st" = "healthy" ] && break
            [ "$st" = "unhealthy" ] && { docker logs --tail 100 lin-blog-pr-verify_app; exit 1; }
            sleep 3
          done
          [ "$st" = "healthy" ] || { echo "health=$st"; docker logs --tail 100 lin-blog-pr-verify_app; exit 1; }
          curl -sf http://127.0.0.1:3200/ >/dev/null
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3200/admin)
          [ "$code" = "307" ] || [ "$code" = "302" ] || { echo "anon /admin expected redirect, got $code"; exit 1; }
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3200/api/admin/subscribers)
          [ "$code" = "401" ] || { echo "anon protected API expected 401, got $code"; exit 1; }
          $COMPOSE down -v

  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: [ci]  # 等待 CI 通過
    # 僅在 push 到 main 時才建置（排除 PR）
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      # NEXT_PUBLIC_* 為 build-time 內嵌：secret 缺失時 Actions 靜默解析為空字串，
      # 問題直到 production UI 才顯現（v1.4.3 訂閱表單事故根因）。release tag 建置
      # 缺必要 secret 即 fail；main/dispatch 建置僅警告，不阻擋開發流程。
      - name: Validate build secrets
        env:
          RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          missing=""
          [ -z "$RECAPTCHA_SITE_KEY" ] && missing="$missing NEXT_PUBLIC_RECAPTCHA_SITE_KEY"
          [ -z "$SITE_URL" ] && missing="$missing NEXT_PUBLIC_SITE_URL"
          if [ -n "$missing" ]; then
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "::error::Release build missing required secrets:$missing"
              exit 1
            fi
            echo "::warning::Build secrets empty (will be inlined as empty strings):$missing"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_PUBLIC_FB_PIXEL_ID=${{ secrets.NEXT_PUBLIC_FB_PIXEL_ID }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
