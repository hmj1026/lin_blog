name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  # e2e 無真正共享的外部資源（Postgres 為每次 run 全新隔離的 service 容器），
  # 同一 ref 的重複 run 不互相取消，避免取消中的驗證造成誤判。
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16   # 對齊 docker-compose.yml 的 postgres:16-alpine（生產版本）
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      NEXTAUTH_SECRET: test-secret-for-ci-minimum-32-characters
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # secrets 未設定時以 expression 層 fallback 補預設值：確保 seed 步驟與
      # Playwright specs（process.env || "admin" fallback 不會在 CI 觸發）看到同一組
      # 憑證。
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL || 'admin@lin.blog' }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'e2e-admin-pass' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./web

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: ./web

      - name: Seed test database
        run: npm run db:seed
        working-directory: ./web
        env:
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./web

      - name: Build Next.js
        run: npm run build
        working-directory: ./web

      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: ./web
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: web/test-results/
          retention-days: 7
