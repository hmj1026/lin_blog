name: E2E Tests

on:
  # E2E ŠöÂŠľéšé║ňůęňÇő PR ÚľśÚľÇ´╝ÜPRÔćĺdevelop´╝łňŐčŔâŻÚľśÚľÇ´╝ëŔłç PRÔćĺmain´╝łrelease ÚľśÚľÇ´╝ëŃÇé
  # ňĚ▓šž╗ÚÖĄ push:[main]ÔÇöÔÇörelease PR šÜä E2E ňĚ▓ÚęŚŔşëŔłç merge ňżî main HEAD ň╣żń╣ÄšŤŞňÉîšÜäňůžň«╣´╝î
  # pushÔćĺmain ÚçŹŔĚĹň▒ČňćŚÚĄś´╝łdesign D1´╝ëŃÇépost-merge ň░Ź main šÜäŠŐŐÚŚťšö▒ docker-build.yml šÜä
  # reusable CI ŠĆÉńżŤ´╝łšäí E2E´╝îŔłç tag build ŔĚ»ňżĹńŞÇŔç┤´╝ëŃÇé
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  # e2e šäíšťčŠşúňů▒ń║źšÜäňĄľÚâĘŔ│çŠ║É´╝łPostgres šé║Š»ĆŠČí run ňůĘŠľ░ÚÜöÚŤóšÜä service ň«╣ňÖĘ´╝ë´╝î
  # ňÉîńŞÇ ref´╝łPR šÜä refs/pull/N/merge´╝ëšÜäÚçŹŔĄç run ńŞŹń║ĺšŤŞňĆľŠÂł´╝îÚü┐ňůŹňĆľŠÂłńŞşšÜäÚęŚŔşëÚÇáŠłÉŔ¬ĄňłĄŃÇé
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  e2e:
    name: Playwright E2E Tests (shard ${{ matrix.shard }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      # ňŤ║ň«Ü 3 šëç´╝łoptimize-e2e-test-suite design D3/D0´╝ë´╝Ťshard Ŕłç
      # shardTotal ÚťÇńŞÇŔÁĚŠö╣´╝îňŤŤšëçňĆ¬ňťĘńŞëšëçň»ŽŠŞČŠť¬Úüö critical-path ÚľÇŠ¬╗ŠÖéŠëŹŔęĽń╝░ŃÇé
      matrix:
        shard: [1, 2, 3]
        shardTotal: [3]

    services:
      postgres:
        image: postgres:16   # ň░ŹÚŻŐ docker-compose.yml šÜä postgres:16-alpine´╝łšöčšöóšëłŠťČ´╝ë
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      NEXTAUTH_SECRET: test-secret-for-ci-minimum-32-characters
      CRON_SECRET: ci-build-cron-secret-placeholder
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # secrets Šť¬ŔĘşň«ÜŠÖéń╗ą expression ň▒Ą fallback ŔúťÚáÉŔĘşňÇ╝´╝Üšó║ń┐Ł seed ŠşąÚęčŔłç
      # Playwright specs´╝łprocess.env || "admin" fallback ńŞŹŠťâňťĘ CI ŔžŞšÖ╝´╝ëšťőňł░ňÉîńŞÇšÁä
      # ŠćĹŔşëŃÇé
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL || 'admin@lin.blog' }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'e2e-admin-pass' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Resolve installed Playwright version
        id: playwright-version
        # šöĘň»ŽÚÜŤň«ëŔúŁňł░ node_modules šÜäšëłŠťČ´╝łŔÇîÚŁ× package.json ŔúíšÜä range´╝ëň╗║šźő
        # cache key´╝îÚü┐ňůŹ semver range ňĹŻńŞşÚî»Ŕ¬ĄšëłŠťČšÜäň┐źňĆľ´╝łdesign D4´╝ëŃÇé
        run: |
          version=$(node -e "console.log(require('./node_modules/@playwright/test/package.json').version)")
          echo "version=$version" >> "$GITHUB_OUTPUT"
        working-directory: ./web

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Chromium OS dependencies
        # Š»ĆšëçÚâŻŔŽüŠ║ľňéÖ´╝îňŹ│ńŻ┐ browser binary cache hit ń╣čńŞŹŔâŻšťüšĽą´╝îňÉŽňëçŠťâŠťë
        # binary ńŻćš╝║š│╗šÁ▒ňąŚń╗Â´╝łdesign D4 ÚóĘÚÜ¬´╝ëŃÇéňůłšöĘň«śŠľ╣ dry-run ÚęŚŔşë runner
        # šĆżŠťëňąŚń╗Â´╝ŤňĆ¬Šťëš╝║ňąŚń╗ÂŠëŹÚÇ▓ apt ň«ëŔúŁŃÇéhosted runner šÜä apt ňüÂšłżŠťâšäíŔ╝Şňç║
        # ňŹíńŻĆ´╝îňŤáŠşĄ fallback ÚÖÉňłÂňľ«ŠČí 180 šžĺńŞŽÚçŹŔęŽńŞÇŠČí´╝îÚü┐ňůŹŔÇŚšŤí job timeoutŃÇé
        run: |
          if npx playwright install-deps --dry-run chromium; then
            echo "Chromium OS dependencies are already satisfied"
            exit 0
          fi
          for attempt in 1 2; do
            if timeout --kill-after=10s 180s npx playwright install-deps chromium; then
              exit 0
            fi
            if [ "$attempt" -eq 2 ]; then
              echo "::error::Chromium OS dependencies installation failed after 2 attempts"
              exit 1
            fi
            echo "::warning::Chromium OS dependencies installation timed out; retrying once"
            sleep 5
          done
        working-directory: ./web

      - name: Install Chromium browser binary
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: ./web

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./web

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: ./web

      - name: Seed test database
        run: npm run db:seed
        working-directory: ./web
        env:
          ADMIN_EMAIL: ${{ env.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ env.E2E_ADMIN_PASSWORD }}

      # ńŞŹňčĚŔíî `npm run build`´╝ÜE2E šŤ┤ŠÄąň░Ź `next dev` ŠŞČŔęŽ´╝ł`npm run dev`
      # ńŞŹÚťÇŔŽü `.next` production šöóšëę´╝ë´╝îPR šÜä production build šö▒ ci.yml
      # šÜä build job ŔŽćŔôő´╝îňůęŔÇůŔ▓Čń╗╗ńŞŹÚçŹšľŐ´╝łdesign D4´╝ëŃÇé

      - name: Run Playwright tests
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/${{ matrix.shardTotal }}
        working-directory: ./web
        env:
          CI: true

      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: web/blob-report/
          retention-days: 7

      - name: Upload failure diagnostics (trace/screenshots)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-${{ matrix.shard }}
          path: web/test-results/
          retention-days: 7

  merge-reports:
    name: Merge Playwright reports
    needs: [e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Download all blob reports
        uses: actions/download-artifact@v7
        with:
          pattern: blob-report-*
          path: web/all-blob-reports
          merge-multiple: true

      - name: Merge into a single HTML report
        run: npx playwright merge-reports --reporter=html ./all-blob-reports
        working-directory: ./web
        env:
          PLAYWRIGHT_HTML_OPEN: never

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Fail workflow if any E2E shard failed
        # merge job ŠťČŔ║źŠ░ŞÚüá if: always() ňčĚŔíîń╗ąšó║ń┐Łňá▒ňĹŐňĆ»šöóňç║´╝îńŻćńŞŹŔâŻŠŐŐ
        # e2e matrix šÜäňĄ▒ŠĽŚňÉ×ŠłÉ workflow success´╝łdesign D5 / spec scenario´╝ëŃÇé
        if: needs.e2e.result != 'success'
        run: |
          echo "::error::Ŕç│ň░ĹńŞÇňÇő E2E shard ňĄ▒ŠĽŚ´╝łneeds.e2e.result=${{ needs.e2e.result }}´╝ë"
          exit 1
