name: CI

on:
  pull_request:
    branches: [main, develop]  # 對 main 或 develop 的 PR 皆觸發品質閘門
  workflow_call:  # 允許其他 workflow 調用（如 docker-build.yml 於 push main / tag 時）
  # 註：已移除 ci.yml 自身的 push:[main] 觸發（決策 C）。合併後對 main 的驗證改由
  # docker-build.yml 的 push:[main] → workflow_call 呼叫本 workflow 提供，避免同一次
  # 合併重複跑兩次完整矩陣。develop 目前無 post-merge 檢查為已知、已接受的落差。

concurrency:
  # 納入 github.workflow：以 workflow_call 被呼叫時，github.workflow 會解析為「呼叫端」
  # 的名稱，因此 reusable 呼叫與 ci.yml 自身觸發會落在不同群組、彼此不互相取消。
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect Node matrix
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Determine Node version matrix
        id: set-matrix
        # PR → develop（無 branch protection）縮減為單一版本（22，對齊 production 基準）；
        # PR → main / push / workflow_call 維持雙版本 [20, 22]，以產生 branch protection
        # 綁定的 Build (Node 20) / Build (Node 22) 兩個必要 context。
        # 以 env 傳入並加引號，避免 context 值被直接內插進 shell（injection 防護）。
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ "$BASE_REF" = "develop" ]; then
            echo 'versions=["22"]' >> "$GITHUB_OUTPUT"
          else
            echo 'versions=["20","22"]' >> "$GITHUB_OUTPUT"
          fi

      - name: Assert runtime baseline consistency
        # runtime 基準契約（task 7.5）：Node 主版本在 web/.nvmrc、web/Dockerfile、
        # web/package.json 的 engines.node 三處必須一致；Postgres 主版本在 e2e.yml 與
        # docker-compose.yml 之間必須一致。這些宣告無自動 enforce，故用本 step 防止各自硬編漂移。
        run: |
          # GitHub Actions 預設 shell 為 `bash -eo pipefail`；grep 無匹配會回傳非零並提前中止
          # 整個 step、跳過下方的錯誤彙整。故每個擷取都以 `|| true` 收斂為空字串，交由 -z 檢查處理。
          fail=0
          # 各擷取皆錨定行首並只取主版本，避免註解/嵌入文字誤匹配；.nvmrc 容許 v 前綴與 semver（v22 / 22.11.0 → 22）。
          nvmrc="$(grep -oP '^\s*v?\K[0-9]+' web/.nvmrc | head -1 || true)"
          docker_node="$(grep -oP '^\s*FROM\s+(--\S+\s+)*node:\K[0-9]+' web/Dockerfile | head -1 || true)"
          # engines.node 下界主版本：要求值以 >= 開頭（避免複合 range 誤取錯誤邊界），例如 ">=22 <25" → 22
          engines_node="$(grep -oP '"node"\s*:\s*"\s*>=\s*\K[0-9]+' web/package.json | head -1 || true)"
          echo "Node major → .nvmrc=${nvmrc:-<none>}  Dockerfile=${docker_node:-<none>}  engines.node(lower)=${engines_node:-<none>}"
          for pair in "web/.nvmrc:${nvmrc}" "web/Dockerfile:${docker_node}" "engines.node:${engines_node}"; do
            if [ -z "${pair#*:}" ]; then echo "::error::無法擷取 ${pair%%:*} 的 Node 主版本"; fail=1; fi
          done
          if [ -n "${nvmrc}" ] && { [ "${nvmrc}" != "${docker_node}" ] || [ "${nvmrc}" != "${engines_node}" ]; }; then
            echo "::error::Node 基準不一致：.nvmrc=${nvmrc} / Dockerfile=node:${docker_node}-slim / engines.node 下界=${engines_node}"
            fail=1
          fi
          e2e_pg="$(grep -oP '^\s*image:\s*postgres:\K[0-9]+' .github/workflows/e2e.yml | head -1 || true)"
          ci_pg="$(grep -oP '^\s*image:\s*postgres:\K[0-9]+' .github/workflows/ci.yml | head -1 || true)"
          compose_pg="$(grep -oP '^\s*image:\s*postgres:\K[0-9]+' docker-compose.yml | head -1 || true)"
          echo "Postgres major → e2e.yml=${e2e_pg:-<none>}  ci.yml=${ci_pg:-<none>}  docker-compose.yml=${compose_pg:-<none>}"
          if [ -z "${e2e_pg}" ] || [ -z "${ci_pg}" ] || [ -z "${compose_pg}" ]; then
            echo "::error::無法擷取 Postgres 主版本（e2e.yml=${e2e_pg:-<none>} / ci.yml=${ci_pg:-<none>} / docker-compose.yml=${compose_pg:-<none>}）"; fail=1
          elif [ "${e2e_pg}" != "${compose_pg}" ] || [ "${ci_pg}" != "${compose_pg}" ]; then
            echo "::error::Postgres 版本不一致：e2e.yml=postgres:${e2e_pg} / ci.yml(integration-test)=postgres:${ci_pg} / docker-compose.yml=postgres:${compose_pg}"; fail=1
          fi
          [ "$fail" = 0 ] || exit 1

  lint:
    name: Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [detect]
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.detect.outputs.versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Run ESLint
        run: npm run lint
        working-directory: ./web

  type-check:
    name: Type Check (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [detect]
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.detect.outputs.versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./web

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        working-directory: ./web

  test:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [detect]
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.detect.outputs.versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./web

      - name: Run Vitest
        run: npm run test -- --coverage
        working-directory: ./web

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: web/coverage/
          retention-days: 7

  integration-test:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: [detect]
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16   # 對齊 docker-compose.yml 的 postgres:16-alpine（生產版本）
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # global-setup 會以此為基底建立 lin_blog_test 資料庫並套用 prisma migrate deploy
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./web

      - name: Run integration tests (real PostgreSQL)
        run: npm run test:integration
        working-directory: ./web

  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [detect, lint, type-check, test, integration-test]
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ fromJSON(needs.detect.outputs.versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./web

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./web

      - name: Build Next.js
        run: npm run build
        working-directory: ./web
        env:
          NEXTAUTH_SECRET: ci-build-secret-placeholder
          CRON_SECRET: ci-build-cron-secret-placeholder
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_SITE_URL: https://ci-build.example.com
